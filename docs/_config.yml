title: Papercraft Manual
description: User-facing documentation for Papercraft XML templates and the X39.Solutions.PdfTemplate compatibility bridge.
theme: jekyll-theme-minimal
show_downloads: false

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

include:
  - manual

defaults:
  - scope:
      path: ""
    values:
      layout: default
