<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>

        {% if site.description %}
          <p>{{ site.description }}</p>
        {% endif %}

        {% include manual-navigation.html %}
      </header>

      <section>
        {{ content }}
      </section>

      <footer>
        <p><a href="https://github.com/X39/X39.Solutions.PdfTemplate">Repository</a></p>
      </footer>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/sample-preview.js' | relative_url }}" defer></script>
  </body>
</html>
