name: Benchmark reports

on:
  workflow_dispatch:
    inputs:
      filter:
        description: BenchmarkDotNet filter. Used for custom runs and as an optional extra filter for category runs.
        required: true
        default: "*"
        type: string
      category:
        description: Benchmark category preset.
        required: true
        default: all
        type: choice
        options:
          - all
          - activation
          - controls
          - transformers
          - parsing
          - templateCreation
          - generation
          - custom
      job:
        description: BenchmarkDotNet job. Use Default for a full default run.
        required: true
        default: Short
        type: choice
        options:
          - Short
          - Medium
          - Long
          - Dry
          - Default
      warmup_count:
        description: Optional warmup count override. Leave empty to use the selected job default.
        required: false
        default: ""
        type: string
      iteration_count:
        description: Optional iteration count override. Leave empty to use the selected job default.
        required: false
        default: ""
        type: string

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install R for BenchmarkDotNet plots
        run: |
          sudo apt-get update
          sudo apt-get install -y r-base

      - name: Restore dependencies
        run: dotnet restore X39.Solutions.PdfTemplate.sln

      - name: Build Release
        run: dotnet build X39.Solutions.PdfTemplate.sln -c Release --no-restore

      - name: Run BenchmarkDotNet
        run: |
          args=()

          case "${{ inputs.category }}" in
            all)
              args+=(--filter "${{ inputs.filter }}")
              ;;
            activation)
              args+=(--anyCategories Activation)
              ;;
            controls)
              args+=(--anyCategories Controls)
              ;;
            transformers)
              args+=(--anyCategories Transformers)
              ;;
            parsing)
              args+=(--anyCategories Parsing)
              ;;
            templateCreation)
              args+=(--anyCategories TemplateCreation)
              ;;
            generation)
              args+=(--anyCategories Generation)
              ;;
            custom)
              args+=(--filter "${{ inputs.filter }}")
              ;;
          esac

          if [ "${{ inputs.category }}" != "all" ] && [ "${{ inputs.category }}" != "custom" ] && [ "${{ inputs.filter }}" != "*" ]; then
            args+=(--filter "${{ inputs.filter }}")
          fi

          if [ "${{ inputs.job }}" != "Default" ]; then
            args+=(--job "${{ inputs.job }}")
          fi

          if [ -n "${{ inputs.warmup_count }}" ]; then
            args+=(--warmupCount "${{ inputs.warmup_count }}")
          fi

          if [ -n "${{ inputs.iteration_count }}" ]; then
            args+=(--iterationCount "${{ inputs.iteration_count }}")
          fi

          dotnet run -c Release --project benchmark/X39.Solutions.PdfTemplate.Benchmark/X39.Solutions.PdfTemplate.Benchmark.csproj -- "${args[@]}"

      - name: Upload BenchmarkDotNet artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarkdotnet-artifacts-${{ github.run_number }}
          path: BenchmarkDotNet.Artifacts/**
          if-no-files-found: warn
          retention-days: 30
